<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Saint Georges Mieh w Mieh - Connection Test</title>
    <style>
        /* ==========================================================================
           DESIGN & COLOR PALETTE
           ========================================================================== */
        :root {
            --green: #2d6a4f;
            --dark-green: #1b4332;
            --brown: #7f5539;
            --dark-brown: #5c3d2e;
            --beige: #f4f1de;
            --gold: #dda15e;
            --gold-hover: #bc8242;
            --text-dark: #2b2d42;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* ==========================================================================
           BACKGROUND & LOGOS
           ========================================================================== */
        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
            background-color: var(--dark-green); /* Fallback */
        }

        #bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        .fixed-logo {
            position: fixed;
            top: 20px;
            height: 85px;
            object-fit: contain;
            z-index: 100;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
            transition: transform 0.3s ease;
        }

        .fixed-logo.left {
            left: 20px;
        }

        .fixed-logo.right {
            right: 20px;
        }

        .fixed-logo:hover {
            transform: scale(1.05);
        }

        /* Hide broken image icon when src is empty */
        img[src=""], img:not([src]) {
            opacity: 0;
        }

        /* ==========================================================================
           CENTERED CARD & CONTAINER
           ========================================================================== */
        .container {
            width: 100%;
            max-width: 520px;
            margin: auto;
            z-index: 10;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            color: var(--beige);
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
            margin-bottom: 6px;
        }

        .header p {
            color: var(--gold);
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .card {
            background: var(--beige);
            border-radius: var(--radius);
            padding: 32px 28px;
            box-shadow: var(--shadow);
            border-top: 6px solid var(--green);
            border-bottom: 4px solid var(--gold);
        }

        /* ==========================================================================
           FORM & UI ELEMENTS
           ========================================================================== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--dark-brown);
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            background: #fff;
        }

        .form-control:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .btn:hover {
            background: var(--dark-green);
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* ==========================================================================
           REALTIME DISPLAY AREA
           ========================================================================== */
        .status-container {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 2px dashed rgba(127, 85, 57, 0.3);
        }

        .status-container h2 {
            font-size: 1rem;
            color: var(--brown);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message-box {
            background: #ffffff;
            border-left: 4px solid var(--gold);
            padding: 16px;
            border-radius: 6px;
            font-size: 1.1rem;
            color: var(--dark-green);
            font-weight: 600;
            word-wrap: break-word;
            min-height: 50px;
            display: flex;
            align-items: center;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        .timestamp {
            display: block;
            margin-top: 8px;
            font-size: 0.8rem;
            color: #777;
            text-align: right;
        }

        /* ==========================================================================
           RESPONSIVE DESIGN
           ========================================================================== */
        @media (max-width: 600px) {
            body {
                padding-top: 100px;
            }

            .fixed-logo {
                height: 60px;
                top: 15px;
            }

            .fixed-logo.left {
                left: 15px;
            }

            .fixed-logo.right {
                right: 15px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .card {
                padding: 24px 18px;
            }
        }
    </style>
</head>
<body>

    <!-- BACKGROUND LAYER & OVERLAY -->
    <div id="bg-layer"></div>
    <div id="bg-overlay"></div>

    <!-- LOGOS -->
    <img id="left-logo" class="fixed-logo left" alt="Left Logo" />
    <img id="right-logo" class="fixed-logo right" alt="Right Logo" />

    <!-- CENTERED CONTENT -->
    <div class="container">
        <header class="header">
            <h1>Scout Saint Georges Mieh w Mieh</h1>
            <p>Realtime Database Test</p>
        </header>

        <main class="card">
            <div class="form-group">
                <label for="message-input">Message</label>
                <input type="text" id="message-input" class="form-control" placeholder="Type a test message..." autocomplete="off" />
            </div>

            <button id="save-btn" class="btn">Save</button>

            <div class="status-container">
                <h2>Latest message:</h2>
                <div id="message-display" class="message-box">Connecting to Firebase...</div>
                <small id="updated-at" class="timestamp"></small>
            </div>
        </main>
    </div>

    <!-- FIREBASE CDN & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        // ==========================================================================
        // CONFIGURATION VARIABLES
        // ==========================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCqLoLICq9kbpMsaD58F6U4cwbiMygGrmU",
            authDomain: "troupe-6d1e8.firebaseapp.com",
            projectId: "troupe-6d1e8",
            storageBucket: "troupe-6d1e8.firebasestorage.app",
            messagingSenderId: "978471249719",
            appId: "1:978471249719:web:5126a258fa70ffe0611cb2",
            measurementId: "G-ZM4H7BWWLJ"
        };

        const BACKGROUND_IMAGE = "";
        const LEFT_LOGO = "";
        const RIGHT_LOGO = "";

        // ==========================================================================
        // INITIALIZE IMAGES
        // ==========================================================================
        if (BACKGROUND_IMAGE) {
            document.getElementById('bg-layer').style.backgroundImage = `url('${BACKGROUND_IMAGE}')`;
        }
        if (LEFT_LOGO) {
            document.getElementById('left-logo').src = LEFT_LOGO;
        }
        if (RIGHT_LOGO) {
            document.getElementById('right-logo').src = RIGHT_LOGO;
        }

        // ==========================================================================
        // FIREBASE & REALTIME SYNC
        // ==========================================================================
        let db = null;

        const displayEl = document.getElementById('message-display');
        const timestampEl = document.getElementById('updated-at');
        const inputEl = document.getElementById('message-input');
        const saveBtn = document.getElementById('save-btn');

        try {
            if (firebaseConfig.apiKey) {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                initRealtimeListener();
            } else {
                displayEl.innerText = "Please paste your Firebase configuration at the top of index.html.";
            }
        } catch (err) {
            console.error("Firebase initialization failed:", err);
            displayEl.innerText = "Error initializing Firebase. Check configuration.";
        }

        // Realtime Listener using onSnapshot()
        function initRealtimeListener() {
            const docRef = doc(db, "testData", "currentMessage");

            onSnapshot(docRef, (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.data();
                    displayEl.innerText = data.message || "(No message provided)";
                    
                    if (data.updatedAt) {
                        timestampEl.innerText = `Last updated: ${data.updatedAt}`;
                    } else {
                        timestampEl.innerText = "";
                    }
                } else {
                    displayEl.innerText = "No message saved yet. Type a message above and click Save.";
                    timestampEl.innerText = "";
                }
            }, (error) => {
                console.error("Firestore error:", error);
                displayEl.innerText = "Error loading realtime updates. Check Firestore rules.";
            });
        }

        // Save Functionality
        async function handleSave() {
            const messageText = inputEl.value.trim();

            if (!messageText) {
                alert("Please enter a message first!");
                return;
            }

            if (!db) {
                alert("Firebase is not initialized. Please configure firebaseConfig in index.html.");
                return;
            }

            saveBtn.disabled = true;
            saveBtn.innerText = "Saving...";

            try {
                const docRef = doc(db, "testData", "currentMessage");
                const formattedDate = new Date().toLocaleString();

                await setDoc(docRef, {
                    message: messageText,
                    updatedAt: formattedDate
                });

                inputEl.value = "";
            } catch (err) {
                console.error("Error saving document:", err);
                alert("Could not save message. Make sure Firestore rules allow writes.");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "Save";
            }
        }

        // Event Listeners
        saveBtn.addEventListener('click', handleSave);
        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSave();
        });
    </script>
</body>
</html>

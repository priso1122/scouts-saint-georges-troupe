<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Saint Georges Mieh w Mieh - Connection Test</title>
    <style>
        /* ==========================================================================
           DESIGN & COLOR PALETTE
           ========================================================================== */
        :root {
            --green: #2d6a4f;
            --dark-green: #1b4332;
            --brown: #7f5539;
            --dark-brown: #5c3d2e;
            --beige: #f4f1de;
            --gold: #dda15e;
            --gold-hover: #bc8242;
            --text-dark: #2b2d42;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* ==========================================================================
           BACKGROUND & LOGOS
           ========================================================================== */
        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
            background-color: var(--dark-green); /* Fallback */
        }

        #bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        .fixed-logo {
            position: fixed;
            top: 20px;
            height: 85px;
            object-fit: contain;
            z-index: 100;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
            transition: transform 0.3s ease;
        }

        .fixed-logo.left {
            left: 20px;
        }

        .fixed-logo.right {
            right: 20px;
        }

        .fixed-logo:hover {
            transform: scale(1.05);
        }

        img[src=""], img:not([src]) {
            opacity: 0;
        }

        /* ==========================================================================
           CENTERED CARD & CONTAINER
           ========================================================================== */
        .container {
            width: 100%;
            max-width: 520px;
            margin: auto;
            z-index: 10;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            color: var(--beige);
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
            margin-bottom: 6px;
        }

        .header p {
            color: var(--gold);
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .card {
            background: var(--beige);
            border-radius: var(--radius);
            padding: 32px 28px;
            box-shadow: var(--shadow);
            border-top: 6px solid var(--green);
            border-bottom: 4px solid var(--gold);
        }

        /* ==========================================================================
           FORM & UI ELEMENTS
           ========================================================================== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--dark-brown);
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            background: #fff;
        }

        .form-control:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            margin-bottom: 10px;
        }

        .btn:hover {
            background: var(--dark-green);
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--brown);
        }

        .btn-secondary:hover {
            background: var(--dark-brown);
        }

        .btn-outline {
            background: transparent;
            color: var(--dark-brown);
            border: 2px solid var(--brown);
            box-shadow: none;
        }

        .btn-outline:hover {
            background: var(--brown);
            color: white;
        }

        .error-message {
            color: #d62828;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        /* ==========================================================================
           REALTIME DISPLAY AREA
           ========================================================================== */
        .status-container {
            margin-top: 15px;
            padding-top: 20px;
            border-top: 2px dashed rgba(127, 85, 57, 0.3);
        }

        .status-container h2 {
            font-size: 1rem;
            color: var(--brown);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message-box {
            background: #ffffff;
            border-left: 4px solid var(--gold);
            padding: 16px;
            border-radius: 6px;
            font-size: 1.1rem;
            color: var(--dark-green);
            font-weight: 600;
            word-wrap: break-word;
            min-height: 50px;
            display: flex;
            align-items: center;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        .timestamp {
            display: block;
            margin-top: 8px;
            font-size: 0.8rem;
            color: #777;
            text-align: right;
        }

        .mt-3 {
            margin-top: 20px;
        }

        /* Utility for hiding views */
        .hidden {
            display: none !important;
        }

        /* ==========================================================================
           RESPONSIVE DESIGN
           ========================================================================== */
        @media (max-width: 600px) {
            body {
                padding-top: 100px;
            }

            .fixed-logo {
                height: 60px;
                top: 15px;
            }

            .fixed-logo.left {
                left: 15px;
            }

            .fixed-logo.right {
                right: 15px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .card {
                padding: 24px 18px;
            }
        }
    </style>
</head>
<body>

    <!-- BACKGROUND LAYER & OVERLAY -->
    <div id="bg-layer"></div>
    <div id="bg-overlay"></div>

    <!-- LOGOS -->
    <img id="left-logo" class="fixed-logo left" alt="Left Logo" />
    <img id="right-logo" class="fixed-logo right" alt="Right Logo" />

    <!-- CENTERED CONTENT -->
    <div class="container">
        <header class="header">
            <h1>Scout Saint Georges Mieh w Mieh</h1>
            <p>Realtime Database Test</p>
        </header>

        <!-- PUBLIC VIEWER SCREEN -->
        <main id="public-screen" class="card">
            <div class="status-container" style="border-top: none; padding-top: 0; margin-top: 0;">
                <h2>Latest message:</h2>
                <div id="public-message-display" class="message-box">Connecting to Firebase...</div>
                <small id="public-updated-at" class="timestamp"></small>
            </div>
            <button id="show-login-btn" class="btn btn-outline mt-3">Admin Login</button>
        </main>

        <!-- LOGIN SCREEN -->
        <main id="login-screen" class="card hidden">
            <h2 style="color: var(--dark-green); margin-bottom: 20px; text-align: center;">Admin Login</h2>
            
            <div id="login-error" class="error-message">Invalid Username or Password.</div>

            <div class="form-group">
                <label for="username-input">Username</label>
                <input type="text" id="username-input" class="form-control" placeholder="Enter username" autocomplete="off" />
            </div>

            <div class="form-group">
                <label for="password-input">Password</label>
                <input type="password" id="password-input" class="form-control" placeholder="Enter password" />
            </div>

            <button id="login-btn" class="btn">Login</button>
            <button id="cancel-btn" class="btn btn-outline">Cancel</button>
        </main>

        <!-- ADMIN DASHBOARD SCREEN -->
        <main id="admin-screen" class="card hidden">
            <h2 style="color: var(--dark-green); margin-bottom: 20px;">Admin Dashboard</h2>
            <div class="form-group">
                <label for="message-input">Update Message</label>
                <input type="text" id="message-input" class="form-control" placeholder="Type a test message..." autocomplete="off" />
            </div>

            <button id="save-btn" class="btn">Save Message</button>
            <button id="logout-btn" class="btn btn-outline">Logout</button>

            <div class="status-container">
                <h2>Live View:</h2>
                <div id="admin-message-display" class="message-box">Connecting to Firebase...</div>
                <small id="admin-updated-at" class="timestamp"></small>
            </div>
        </main>
    </div>

    <!-- FIREBASE CDN & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        // ==========================================================================
        // CONFIGURATION VARIABLES
        // ==========================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCqLoLICq9kbpMsaD58F6U4cwbiMygGrmU",
            authDomain: "troupe-6d1e8.firebaseapp.com",
            projectId: "troupe-6d1e8",
            storageBucket: "troupe-6d1e8.firebasestorage.app",
            messagingSenderId: "978471249719",
            appId: "1:978471249719:web:5126a258fa70ffe0611cb2",
            measurementId: "G-ZM4H7BWWLJ"
        };

        const BACKGROUND_IMAGE = "";
        const LEFT_LOGO = "";
        const RIGHT_LOGO = "";

        // ==========================================================================
        // INITIALIZE IMAGES
        // ==========================================================================
        if (BACKGROUND_IMAGE) {
            document.getElementById('bg-layer').style.backgroundImage = `url('${BACKGROUND_IMAGE}')`;
        }
        if (LEFT_LOGO) {
            document.getElementById('left-logo').src = LEFT_LOGO;
        }
        if (RIGHT_LOGO) {
            document.getElementById('right-logo').src = RIGHT_LOGO;
        }

        // ==========================================================================
        // UI & NAVIGATION LOGIC (WITH PERSISTENT LOGIN CHECK)
        // ==========================================================================
        const publicScreen = document.getElementById('public-screen');
        const loginScreen = document.getElementById('login-screen');
        const adminScreen = document.getElementById('admin-screen');

        const showLoginBtn = document.getElementById('show-login-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');

        const usernameInput = document.getElementById('username-input');
        const passwordInput = document.getElementById('password-input');
        const loginError = document.getElementById('login-error');

        // Check if admin was previously logged in on this device
        if (localStorage.getItem('scoutAdminLoggedIn') === 'true') {
            publicScreen.classList.add('hidden');
            adminScreen.classList.remove('hidden');
        }

        // Navigation functions
        showLoginBtn.addEventListener('click', () => {
            publicScreen.classList.add('hidden');
            loginScreen.classList.remove('hidden');
            usernameInput.focus();
        });

        cancelBtn.addEventListener('click', () => {
            loginScreen.classList.add('hidden');
            publicScreen.classList.remove('hidden');
            loginError.style.display = 'none';
            usernameInput.value = '';
            passwordInput.value = '';
        });

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('scoutAdminLoggedIn');
            adminScreen.classList.add('hidden');
            publicScreen.classList.remove('hidden');
            usernameInput.value = '';
            passwordInput.value = '';
        });

        // Authentication logic
        function attemptLogin() {
            if (usernameInput.value === 'chef' && passwordInput.value === 'chef') {
                localStorage.setItem('scoutAdminLoggedIn', 'true');
                loginError.style.display = 'none';
                loginScreen.classList.add('hidden');
                adminScreen.classList.remove('hidden');
                usernameInput.value = '';
                passwordInput.value = '';
            } else {
                loginError.style.display = 'block';
            }
        }

        loginBtn.addEventListener('click', attemptLogin);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') attemptLogin();
        });

        // ==========================================================================
        // FIREBASE & REALTIME SYNC
        // ==========================================================================
        let db = null;

        // Elements to update
        const publicDisplayEl = document.getElementById('public-message-display');
        const publicTimestampEl = document.getElementById('public-updated-at');
        
        const adminDisplayEl = document.getElementById('admin-message-display');
        const adminTimestampEl = document.getElementById('admin-updated-at');
        
        const inputEl = document.getElementById('message-input');
        const saveBtn = document.getElementById('save-btn');

        try {
            if (firebaseConfig.apiKey) {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                initRealtimeListener();
            } else {
                const msg = "Please paste your Firebase configuration at the top of index.html.";
                publicDisplayEl.innerText = msg;
                adminDisplayEl.innerText = msg;
            }
        } catch (err) {
            console.error("Firebase initialization failed:", err);
            const msg = "Error initializing Firebase. Check configuration.";
            publicDisplayEl.innerText = msg;
            adminDisplayEl.innerText = msg;
        }

        // Realtime Listener using onSnapshot()
        function initRealtimeListener() {
            const docRef = doc(db, "testData", "currentMessage");

            onSnapshot(docRef, (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.data();
                    const text = data.message || "(No message provided)";
                    const time = data.updatedAt ? `Last updated: ${data.updatedAt}` : "";
                    
                    publicDisplayEl.innerText = text;
                    adminDisplayEl.innerText = text;

                    publicTimestampEl.innerText = time;
                    adminTimestampEl.innerText = time;
                } else {
                    const text = "No message saved yet.";
                    publicDisplayEl.innerText = text;
                    adminDisplayEl.innerText = text;
                    publicTimestampEl.innerText = "";
                    adminTimestampEl.innerText = "";
                }
            }, (error) => {
                console.error("Firestore error:", error);
                const msg = "Error loading realtime updates. Check Firestore rules.";
                publicDisplayEl.innerText = msg;
                adminDisplayEl.innerText = msg;
            });
        }

        // Save Functionality
        async function handleSave() {
            const messageText = inputEl.value.trim();

            if (!messageText) {
                alert("Please enter a message first!");
                return;
            }

            if (!db) {
                alert("Firebase is not initialized. Please configure firebaseConfig in index.html.");
                return;
            }

            saveBtn.disabled = true;
            saveBtn.innerText = "Saving...";

            try {
                const docRef = doc(db, "testData", "currentMessage");
                const formattedDate = new Date().toLocaleString();

                await setDoc(docRef, {
                    message: messageText,
                    updatedAt: formattedDate
                });

                inputEl.value = "";
            } catch (err) {
                console.error("Error saving document:", err);
                alert("Could not save message. Make sure Firestore rules allow writes.");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "Save Message";
            }
        }

        // Event Listeners for Saving
        saveBtn.addEventListener('click', handleSave);
        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSave();
        });
    </script>
</body>
</html>

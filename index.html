<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scout Saint Georges Mieh w Mieh</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs (Modular / Compat via CDN) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        /* ==========================================================================
           GLOBAL DESIGN SYSTEM & RESPONSIVE VARIABLES
           ========================================================================== */
        :root {
            --primary: #0056b3;
            --secondary: #e63946;
            --accent: #f4a261;
            --bg-color: #f8f9fa;
            --surface: #ffffff;
            --text-dark: #212529;
            --text-light: #6c757d;
            --border-radius: 12px;
            --transition: all 0.3s ease;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --font-head: 'Montserrat', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); background-color: var(--bg-color); color: var(--text-dark); overflow-x: hidden; }
        h1, h2, h3, h4, h5 { font-family: var(--font-head); font-weight: 800; }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        img { max-width: 100%; height: auto; }

        button { font-family: var(--font-head); cursor: pointer; border: none; border-radius: 8px; font-weight: 600; transition: var(--transition); }
        .btn-primary { background-color: var(--primary); color: white; padding: 12px 24px; font-size: 1rem; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: var(--shadow); }
        .btn-danger { background-color: var(--secondary); color: white; padding: 8px 16px; border-radius: 6px; }
        .btn-edit { background-color: var(--accent); color: white; padding: 8px 16px; border-radius: 6px; }

        .hidden { display: none !important; }
        .view-section { display: none; min-height: 100vh; animation: fadeIn 0.4s ease forwards; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Loading Spinner Overlay */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9);
            z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: var(--font-head); font-size: 1.2rem; color: var(--primary); gap: 15px; transition: opacity 0.3s ease;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid #ddd; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ==========================================================================
           FORMS & MODALS (Mobile Optimized)
           ========================================================================== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px;
        }
        .modal-overlay.active { display: flex; animation: fadeIn 0.3s; }
        .modal-card {
            background: var(--surface); padding: 30px; border-radius: var(--border-radius);
            width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; position: relative;
        }
        .close-modal { position: absolute; top: 15px; right: 15px; background: none; color: var(--text-light); font-size: 1.5rem; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-light); margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; 
            font-family: var(--font-body); font-size: 1rem;
        }
        .modal-card button[type="submit"] { width: 100%; margin-top: 15px; }

        /* ==========================================================================
           WELCOME PAGE
           ========================================================================== */
        .hero-section {
            position: relative; height: 100vh;
            background-image: url('homescreen_bg.jpeg'); background-size: cover; background-position: center;
            display: flex; flex-direction: column;
        }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 100%); z-index: 1; }
        .hero-header { position: relative; z-index: 2; display: flex; justify-content: space-between; padding: 20px; width: 100%; }
        .hero-logo { height: clamp(50px, 8vw, 80px); width: auto; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }
        .hero-content {
            position: relative; z-index: 2; flex-grow: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; color: white; padding: 0 20px;
        }
        .hero-content h1 { font-size: clamp(2rem, 6vw, 4.5rem); margin-bottom: 15px; text-transform: uppercase; text-shadow: 0 4px 12px rgba(0,0,0,0.6); }
        .hero-actions { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 400px; }
        .hero-actions button { flex: 1; min-width: 150px; }
        .btn-admin-ghost { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 12px 24px; }

        /* ==========================================================================
           APP & ADMIN LAYOUT (Responsive Sidebar)
           ========================================================================== */
        .layout-wrapper { display: flex; min-height: 100vh; position: relative; }
        
        .sidebar {
            width: 280px; background: var(--surface); border-right: 1px solid rgba(0,0,0,0.05);
            display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000;
            transition: transform 0.3s ease;
        }
        .admin-sidebar { background: #111827; color: white; }
        .admin-sidebar h2, .sidebar h2 { padding: 20px; font-size: 1.2rem; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .admin-sidebar h2 { border-color: #374151; }
        
        .nav-list { flex-grow: 1; overflow-y: auto; padding: 15px 0; }
        .nav-list a { display: flex; align-items: center; gap: 15px; padding: 12px 25px; font-weight: 500; transition: 0.2s; color: var(--text-light); }
        .nav-list a:hover, .nav-list a.active { background: rgba(0, 86, 179, 0.05); color: var(--primary); border-right: 4px solid var(--primary); }
        
        .admin-sidebar .nav-list a { color: #9ca3af; }
        .admin-sidebar .nav-list a:hover, .admin-sidebar .nav-list a.active { background: #1f2937; color: white; border-left: 4px solid #3b82f6; border-right: none; }
        
        .main-content { flex-grow: 1; margin-left: 280px; padding: 30px; transition: margin-left 0.3s ease; width: calc(100% - 280px); }
        .mobile-header { display: none; align-items: center; justify-content: space-between; padding: 15px 20px; background: var(--surface); box-shadow: var(--shadow); position: sticky; top: 0; z-index: 999; }
        
        /* Tables & Data */
        .table-responsive { width: 100%; overflow-x: auto; background: var(--surface); border-radius: var(--border-radius); box-shadow: var(--shadow); margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; color: var(--text-dark); }
        .admin-table th { background: #f3f4f6; }
        
        /* Action Bar */
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }

        /* Dashboard Cards */
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .data-card { background: var(--surface); padding: 25px; border-radius: var(--border-radius); box-shadow: var(--shadow); }

        /* Theme Button */
        .theme-btn { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; z-index: 9999; box-shadow: var(--shadow); }

        /* ==========================================================================
           MOBILE MEDIA QUERIES
           ========================================================================== */
        @media (max-width: 992px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; width: 100%; padding: 15px; }
            .mobile-header { display: flex; }
            .action-bar { flex-direction: column; align-items: stretch; }
            .action-bar button { width: 100%; }
            .modal-card { padding: 20px; width: 95%; }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div>Connecting to Firebase Firestore...</div>
    </div>

    <!-- Theme Button -->
    <button class="theme-btn" onclick="UI.randomTheme()"><i class="fas fa-palette"></i></button>

    <!-- ==========================================================================
         WELCOME SCREEN
         ========================================================================== -->
    <div id="view-welcome" class="view-section">
        <section class="hero-section">
            <div class="hero-overlay"></div>
            <header class="hero-header">
                <img src="scout-du-liban-logo.png" alt="Scouts du Liban" class="hero-logo">
                <img src="logo_mieh_mieh.png" alt="Troupe Logo" class="hero-logo">
            </header>
            <div class="hero-content">
                <h1>Scout Saint Georges<br>Mieh w Mieh</h1>
                <p>Welcome to our Troupe's digital home.</p>
                <div class="hero-actions">
                    <button class="btn-primary" onclick="UI.openModal('modal-login-member')"><i class="fas fa-sign-in-alt"></i> Member Login</button>
                    <button class="btn-admin-ghost" onclick="UI.openModal('modal-login-admin')"><i class="fas fa-shield-alt"></i> Admin Panel</button>
                </div>
            </div>
        </section>
    </div>

    <!-- Login Modals -->
    <div id="modal-login-member" class="modal-overlay">
        <div class="modal-card">
            <button class="close-modal" onclick="UI.closeModal('modal-login-member')"><i class="fas fa-times"></i></button>
            <h2 style="text-align:center; color:var(--primary); margin-bottom:20px;">Member Login</h2>
            <form onsubmit="Auth.login(event, 'member')">
                <div class="form-group"><label>Username</label><input type="text" id="mem-user" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="mem-pass" required></div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
        </div>
    </div>

    <div id="modal-login-admin" class="modal-overlay">
        <div class="modal-card" style="background:#111827; color:white; border:1px solid #374151;">
            <button class="close-modal" onclick="UI.closeModal('modal-login-admin')"><i class="fas fa-times"></i></button>
            <h2 style="text-align:center; margin-bottom:20px;">Admin Gateway</h2>
            <form onsubmit="Auth.login(event, 'admin')">
                <div class="form-group"><label style="color:#9ca3af;">Admin Username</label><input type="text" id="adm-user" style="background:#1f2937; color:white; border:1px solid #374151;" required></div>
                <div class="form-group"><label style="color:#9ca3af;">Password</label><input type="password" id="adm-pass" style="background:#1f2937; color:white; border:1px solid #374151;" required></div>
                <button type="submit" class="btn-primary" style="background:#dc2626;">Access Control Panel</button>
            </form>
        </div>
    </div>


    <!-- ==========================================================================
         ADMIN PANEL INTERFACE
         ========================================================================== -->
    <div id="view-admin" class="view-section">
        <div class="layout-wrapper">
            
            <aside class="sidebar admin-sidebar" id="sidebar-admin">
                <div style="display:flex; justify-content:space-between; align-items:center; padding-right:15px;">
                    <h2>Admin Console</h2>
                    <i class="fas fa-times close-sidebar" style="display:none; cursor:pointer;" onclick="UI.toggleSidebar('sidebar-admin')"></i>
                </div>
                <nav class="nav-list" id="admin-nav">
                    <!-- Nav items generated dynamically -->
                </nav>
                <div style="padding: 20px;">
                    <button class="btn-primary" style="width: 100%; background: #dc2626;" onclick="Auth.logout()">Log Out</button>
                </div>
            </aside>

            <main class="main-content">
                <div class="mobile-header" style="background:#111827; color:white;">
                    <h3 style="margin:0;">Admin Console</h3>
                    <button style="background:none; color:white; font-size:1.5rem;" onclick="UI.toggleSidebar('sidebar-admin')"><i class="fas fa-bars"></i></button>
                </div>

                <div id="admin-content-area">
                    <!-- Dynamic Admin Content Rendered Here -->
                </div>
            </main>
        </div>
    </div>

    <!-- Admin Forms Modals -->
    <!-- Member Form -->
    <div id="modal-form-member" class="modal-overlay">
        <div class="modal-card">
            <button class="close-modal" onclick="UI.closeModal('modal-form-member')"><i class="fas fa-times"></i></button>
            <h2 id="member-form-title">Create Member</h2>
            <form id="form-member" onsubmit="AdminCRUD.saveMember(event)">
                <input type="hidden" id="mem-id">
                <div class="form-group"><label>Full Name</label><input type="text" id="mem-name" required></div>
                <div class="form-group"><label>Username</label><input type="text" id="mem-username" required></div>
                <div class="form-group"><label>Password</label><input type="text" id="mem-password" required></div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="mem-role" required>
                        <option value="member">Standard Member</option>
                        <option value="cp">Chef de Patrouille (CP)</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Assign Patrouille</label>
                    <select id="mem-patrouille">
                        <option value="">-- None --</option>
                        <!-- Populated dynamically -->
                    </select>
                </div>
                <div class="form-group"><label>Profile Picture URL (Optional)</label><input type="text" id="mem-pic" placeholder="https://..."></div>
                <button type="submit" class="btn-primary" id="btn-save-member">Save Member</button>
            </form>
        </div>
    </div>

    <!-- Generic Entity Form (Patrouilles, Activities, Announcements, etc.) -->
    <div id="modal-form-generic" class="modal-overlay">
        <div class="modal-card">
            <button class="close-modal" onclick="UI.closeModal('modal-form-generic')"><i class="fas fa-times"></i></button>
            <h2 id="generic-form-title">Create Item</h2>
            <form id="form-generic" onsubmit="AdminCRUD.saveGeneric(event)">
                <input type="hidden" id="gen-id">
                <input type="hidden" id="gen-type">
                <div class="form-group"><label>Title / Name</label><input type="text" id="gen-title" required></div>
                <div class="form-group"><label>Description / Details</label><textarea id="gen-desc" rows="3"></textarea></div>
                <button type="submit" class="btn-primary" id="btn-save-generic">Save Changes</button>
            </form>
        </div>
    </div>


    <!-- ==========================================================================
         MEMBER / CP APP INTERFACE
         ========================================================================== -->
    <div id="view-app" class="view-section">
        <div class="layout-wrapper">
            <aside class="sidebar" id="sidebar-app">
                <div style="display:flex; justify-content:space-between; align-items:center; padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.1);">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="logo_mieh_mieh.png" alt="Logo" style="height:35px;">
                        <h3 style="font-size:1rem; margin:0; color:var(--primary);">Mieh w Mieh</h3>
                    </div>
                    <i class="fas fa-times close-sidebar" style="display:none; cursor:pointer;" onclick="UI.toggleSidebar('sidebar-app')"></i>
                </div>
                <nav class="nav-list">
                    <a href="#" onclick="AppUI.navigate('dashboard')" class="active"><i class="fas fa-home"></i> Dashboard</a>
                    <a href="#" onclick="AppUI.navigate('calendar')"><i class="far fa-calendar-alt"></i> Calendar</a>
                    <a href="#" onclick="AppUI.navigate('patrouilles')"><i class="fas fa-campground"></i> Patrouilles</a>
                    <a href="#" onclick="AppUI.navigate('activities')"><i class="fas fa-hiking"></i> Activities</a>
                    
                    <div id="cp-nav-container" style="display:none; margin: 15px; padding-top: 15px; border-top: 1px solid #eee;">
                        <span style="font-size:0.8rem; color:var(--text-light); text-transform:uppercase; margin-left:10px;">My Patrouille</span>
                        <a href="#" onclick="AppUI.navigate('my-patrouille')" style="background:var(--primary); color:white; border-radius:8px; margin-top:5px; justify-content:center;">
                            <i class="fas fa-shield-alt"></i> <span id="cp-nav-name">Patrouille Space</span>
                        </a>
                    </div>
                </nav>
                <div style="padding: 20px; border-top:1px solid #eee;">
                    <div id="user-info" style="margin-bottom:15px; font-weight:600; font-size:0.9rem;"></div>
                    <button class="btn-primary" style="width: 100%; background:var(--secondary);" onclick="Auth.logout()">Log Out</button>
                </div>
            </aside>

            <main class="main-content">
                <div class="mobile-header">
                    <h3 style="margin:0; color:var(--primary);">Scout Portal</h3>
                    <button style="background:none; color:var(--text-dark); font-size:1.5rem;" onclick="UI.toggleSidebar('sidebar-app')"><i class="fas fa-bars"></i></button>
                </div>
                <div id="app-content-area">
                    <!-- Dynamic App Content Rendered Here -->
                </div>
            </main>
        </div>
    </div>


    <!-- ==========================================================================
         JAVASCRIPT APPLICATION LOGIC & FIREBASE PERSISTENCE
         ========================================================================== -->
    <script>
        // ----------------------------------------------------------------------
        // 1. FIREBASE CONFIGURATION & INITIALIZATION
        // ----------------------------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyD-Placeholder-KeyForEnvironmentProduction",
            authDomain: "scout-mieh-w-mieh.firebaseapp.com",
            projectId: "scout-mieh-w-mieh",
            storageBucket: "scout-mieh-w-mieh.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abcdef123456789"
        };

        // Initialize Firebase safely
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // ----------------------------------------------------------------------
        // 2. FIRESTORE PERSISTENT DATABASE ENGINE (Source of Truth)
        // ----------------------------------------------------------------------
        const DB = {
            cache: {
                users: [],
                patrouilles: [],
                activities: [],
                announcements: [],
                calendar: [],
                ideas: [],
                photos: []
            },
            loaded: false,
            
            // Initial sync: fetch all collections from Firestore without overwriting or resetting data
            initSync: async function() {
                try {
                    const collections = ['users', 'patrouilles', 'activities', 'announcements', 'calendar', 'ideas', 'photos'];
                    for (let col of collections) {
                        const snapshot = await db.collection(col).get();
                        let items = [];
                        snapshot.forEach(doc => {
                            items.push({ id: doc.id, ...doc.data() });
                        });
                        this.cache[col] = items;
                    }

                    // Bootstrap initial Master Admin if database is completely empty
                    if (this.cache.users.length === 0) {
                        const defaultAdmin = {
                            name: 'Master Admin',
                            username: 'admin',
                            password: 'password',
                            role: 'admin',
                            patrouille: ''
                        };
                        const docRef = await db.collection('users').add(defaultAdmin);
                        this.cache.users.push({ id: docRef.id, ...defaultAdmin });
                    }

                    this.loaded = true;
                    document.getElementById('loading-overlay').style.opacity = '0';
                    setTimeout(() => document.getElementById('loading-overlay').remove(), 300);
                    
                    Auth.checkSession();
                } catch (error) {
                    console.error("Firestore initialization error:", error);
                    document.getElementById('loading-overlay').innerHTML = `
                        <div style="color:var(--secondary); text-align:center; padding:20px;">
                            <h3>Database Connection Error</h3>
                            <p style="font-size:0.9rem; margin-top:10px;">Could not connect to Firebase Firestore. Please check your network connection.</p>
                            <button class="btn-primary" style="margin-top:20px;" onclick="location.reload()">Retry Connection</button>
                        </div>
                    `;
                }
            },
            get: function(collection) {
                return this.cache[collection] || [];
            },
            insert: async function(collection, item) {
                try {
                    const docRef = await db.collection(collection).add(item);
                    const newItem = { id: docRef.id, ...item };
                    this.cache[collection].push(newItem);
                    return newItem;
                } catch (error) {
                    console.error(`Error writing to ${collection}:`, error);
                    alert("Failed to save changes to Firestore database. Please try again.");
                    throw error;
                }
            },
            update: async function(collection, id, updates) {
                try {
                    await db.collection(collection).doc(id).update(updates);
                    const index = this.cache[collection].findIndex(i => i.id === id);
                    if (index > -1) {
                        this.cache[collection][index] = { ...this.cache[collection][index], ...updates };
                    }
                } catch (error) {
                    console.error(`Error updating ${collection}:`, error);
                    alert("Failed to update database record. Please try again.");
                    throw error;
                }
            },
            delete: async function(collection, id) {
                try {
                    await db.collection(collection).doc(id).delete();
                    this.cache[collection] = this.cache[collection].filter(i => i.id !== id);
                } catch (error) {
                    console.error(`Error deleting from ${collection}:`, error);
                    alert("Failed to delete record from database. Please try again.");
                    throw error;
                }
            }
        };

        // Trigger initial Firestore sync on window load
        window.addEventListener('DOMContentLoaded', () => {
            DB.initSync();
        });

        // ----------------------------------------------------------------------
        // 3. AUTHENTICATION LOGIC
        // ----------------------------------------------------------------------
        const Auth = {
            currentUser: null,
            login: function(e, type) {
                e.preventDefault();
                const userField = type === 'admin' ? 'adm-user' : 'mem-user';
                const passField = type === 'admin' ? 'adm-pass' : 'mem-pass';
                const username = document.getElementById(userField).value;
                const password = document.getElementById(passField).value;

                const users = DB.get('users');
                const user = users.find(u => u.username === username && u.password === password);

                if (user) {
                    if (type === 'admin' && user.role !== 'admin') {
                        alert("Access Denied: You do not have administrator privileges.");
                        return;
                    }
                    this.currentUser = user;
                    sessionStorage.setItem('activeUser', JSON.stringify(user));
                    UI.closeModal(`modal-login-${type}`);
                    
                    if (user.role === 'admin') AdminUI.init();
                    else AppUI.init();
                } else {
                    alert("Invalid username or password.");
                }
            },
            logout: function() {
                this.currentUser = null;
                sessionStorage.removeItem('activeUser');
                document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
                document.getElementById('view-welcome').classList.add('active');
            },
            checkSession: function() {
                const saved = sessionStorage.getItem('activeUser');
                if (saved) {
                    this.currentUser = JSON.parse(saved);
                    // Verify user still exists in live Firestore cache
                    const freshUser = DB.get('users').find(u => u.id === this.currentUser.id || u.username === this.currentUser.username);
                    if (freshUser) {
                        this.currentUser = freshUser;
                        if (this.currentUser.role === 'admin') AdminUI.init();
                        else AppUI.init();
                    } else {
                        this.logout();
                    }
                } else {
                    UI.switchView('view-welcome');
                }
            }
        };

        // ----------------------------------------------------------------------
        // 4. UI UTILITIES
        // ----------------------------------------------------------------------
        const UI = {
            openModal: (id) => document.getElementById(id).classList.add('active'),
            closeModal: (id) => {
                document.getElementById(id).classList.remove('active');
                const form = document.querySelector(`#${id} form`);
                if(form) form.reset();
            },
            toggleSidebar: (id) => {
                const sb = document.getElementById(id);
                sb.classList.toggle('open');
                const closeBtn = sb.querySelector('.close-sidebar');
                if(window.innerWidth <= 992) {
                    closeBtn.style.display = sb.classList.contains('open') ? 'block' : 'none';
                }
            },
            switchView: (viewId) => {
                document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
                document.getElementById(viewId).classList.add('active');
                window.scrollTo(0,0);
            },
            randomTheme: () => {
                const themes = [
                    { p: '#0056b3', s: '#e63946', a: '#f4a261' },
                    { p: '#1e40af', s: '#059669', a: '#fbbf24' },
                    { p: '#0f766e', s: '#be123c', a: '#fde047' },
                    { p: '#4338ca', s: '#b91c1c', a: '#fb923c' }
                ];
                const t = themes[Math.floor(Math.random() * themes.length)];
                document.documentElement.style.setProperty('--primary', t.p);
                document.documentElement.style.setProperty('--secondary', t.s);
                document.documentElement.style.setProperty('--accent', t.a);
            }
        };

        // ----------------------------------------------------------------------
        // 5. ADMIN PANEL ARCHITECTURE
        // ----------------------------------------------------------------------
        const AdminSections = [
            { id: 'dashboard', icon: 'fa-chart-line', label: 'Overview' },
            { id: 'users', icon: 'fa-users', label: 'Members & Roles' },
            { id: 'patrouilles', icon: 'fa-campground', label: 'Patrouilles' },
            { id: 'activities', icon: 'fa-hiking', label: 'Activities' },
            { id: 'announcements', icon: 'fa-bullhorn', label: 'Announcements' }
        ];

        let currentAdminSection = 'dashboard';

        const AdminUI = {
            init: function() {
                UI.switchView('view-admin');
                this.renderNav();
                this.loadSection('dashboard');
            },
            renderNav: function() {
                const nav = document.getElementById('admin-nav');
                nav.innerHTML = AdminSections.map(s => `
                    <a href="#" onclick="AdminUI.loadSection('${s.id}')" class="${s.id === currentAdminSection ? 'active' : ''}">
                        <i class="fas ${s.icon}" style="width:25px;"></i> ${s.label}
                    </a>
                `).join('');
            },
            loadSection: function(sectionId) {
                currentAdminSection = sectionId;
                this.renderNav();
                const container = document.getElementById('admin-content-area');
                
                if(window.innerWidth <= 992) document.getElementById('sidebar-admin').classList.remove('open');

                if (sectionId === 'dashboard') {
                    const uCount = DB.get('users').length;
                    const pCount = DB.get('patrouilles').length;
                    const aCount = DB.get('activities').length;
                    container.innerHTML = `
                        <h1 style="margin-bottom:20px;">System Overview (Firestore Connected)</h1>
                        <div class="grid-cards">
                            <div class="data-card"><h3>Total Members</h3><p style="font-size:2rem; font-weight:bold; color:var(--primary);">${uCount}</p></div>
                            <div class="data-card"><h3>Patrouilles</h3><p style="font-size:2rem; font-weight:bold; color:var(--accent);">${pCount}</p></div>
                            <div class="data-card"><h3>Activities</h3><p style="font-size:2rem; font-weight:bold; color:var(--secondary);">${aCount}</p></div>
                        </div>
                    `;
                } 
                else if (sectionId === 'users') {
                    this.renderMembersTable();
                } 
                else {
                    this.renderGenericTable(sectionId);
                }
            },
            renderMembersTable: function() {
                const users = DB.get('users');
                const patrouilles = DB.get('patrouilles');
                let html = `
                    <div class="action-bar">
                        <h1 style="margin:0;">Manage Members</h1>
                        <button class="btn-primary" onclick="AdminCRUD.openMemberModal()"><i class="fas fa-plus"></i> Create Member</button>
                    </div>
                    <div class="table-responsive">
                        <table class="admin-table">
                            <thead><tr><th>Name</th><th>Username</th><th>Role</th><th>Patrouille</th><th>Actions</th></tr></thead>
                            <tbody>
                                ${users.map(u => {
                                    const patObj = patrouilles.find(p => p.id === u.patrouille);
                                    return `
                                        <tr>
                                            <td>${u.name}</td><td>${u.username}</td>
                                            <td><span style="background:#e5e7eb; padding:4px 8px; border-radius:4px; font-size:0.8rem; color:#374151; font-weight:600; text-transform:uppercase;">${u.role}</span></td>
                                            <td>${patObj ? patObj.title : '-'}</td>
                                            <td>
                                                <button class="btn-edit" onclick="AdminCRUD.openMemberModal('${u.id}')"><i class="fas fa-edit"></i></button>
                                                <button class="btn-danger" onclick="AdminCRUD.deleteItem('users', '${u.id}')"><i class="fas fa-trash"></i></button>
                                            </td>
                                        </tr>
                                    `;
                                }).join('')}
                                ${users.length === 0 ? '<tr><td colspan="5" style="text-align:center;">No members found in Firestore.</td></tr>' : ''}
                            </tbody>
                        </table>
                    </div>
                `;
                document.getElementById('admin-content-area').innerHTML = html;
            },
            renderGenericTable: function(collection) {
                const data = DB.get(collection);
                const title = AdminSections.find(s => s.id === collection).label;
                let html = `
                    <div class="action-bar">
                        <h1 style="margin:0;">Manage ${title}</h1>
                        <button class="btn-primary" onclick="AdminCRUD.openGenericModal('${collection}')"><i class="fas fa-plus"></i> Create New</button>
                    </div>
                    <div class="table-responsive">
                        <table class="admin-table">
                            <thead><tr><th>Title / Name</th><th>Details</th><th>Actions</th></tr></thead>
                            <tbody>
                                ${data.map(item => `
                                    <tr>
                                        <td style="font-weight:600;">${item.title}</td>
                                        <td style="color:var(--text-light); max-width:300px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.desc || ''}</td>
                                        <td>
                                            <button class="btn-danger" onclick="AdminCRUD.deleteItem('${collection}', '${item.id}')"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                `).join('')}
                                ${data.length === 0 ? `<tr><td colspan="3" style="text-align:center;">No ${collection} recorded in Firestore.</td></tr>` : ''}
                            </tbody>
                        </table>
                    </div>
                `;
                document.getElementById('admin-content-area').innerHTML = html;
            }
        };

        // ----------------------------------------------------------------------
        // 6. ADMIN CRUD OPERATIONS (Directly connected to Firestore)
        // ----------------------------------------------------------------------
        const AdminCRUD = {
            openMemberModal: function(id = null) {
                const form = document.getElementById('form-member');
                form.reset();
                document.getElementById('mem-id').value = '';
                document.getElementById('member-form-title').innerText = id ? 'Edit Member' : 'Create Member Account';
                
                const patrouilles = DB.get('patrouilles');
                const pSelect = document.getElementById('mem-patrouille');
                pSelect.innerHTML = '<option value="">-- None --</option>' + patrouilles.map(p => `<option value="${p.id}">${p.title}</option>`).join('');

                if (id) {
                    const user = DB.get('users').find(u => u.id === id);
                    if (user) {
                        document.getElementById('mem-id').value = user.id;
                        document.getElementById('mem-name').value = user.name;
                        document.getElementById('mem-username').value = user.username;
                        document.getElementById('mem-password').value = user.password;
                        document.getElementById('mem-role').value = user.role;
                        document.getElementById('mem-patrouille').value = user.patrouille || '';
                        document.getElementById('mem-pic').value = user.pic || '';
                    }
                }
                UI.openModal('modal-form-member');
            },
            saveMember: async function(e) {
                e.preventDefault();
                const id = document.getElementById('mem-id').value;
                const btn = document.getElementById('btn-save-member');
                btn.innerText = "Saving to Firestore...";
                btn.disabled = true;

                const userData = {
                    name: document.getElementById('mem-name').value,
                    username: document.getElementById('mem-username').value,
                    password: document.getElementById('mem-password').value,
                    role: document.getElementById('mem-role').value,
                    patrouille: document.getElementById('mem-patrouille').value,
                    pic: document.getElementById('mem-pic').value
                };

                try {
                    if (id) {
                        await DB.update('users', id, userData);
                    } else {
                        await DB.insert('users', userData);
                    }
                    UI.closeModal('modal-form-member');
                    AdminUI.loadSection('users');
                } catch (err) {
                    console.error(err);
                } finally {
                    btn.innerText = "Save Member";
                    btn.disabled = false;
                }
            },
            openGenericModal: function(collection) {
                document.getElementById('form-generic').reset();
                document.getElementById('gen-id').value = '';
                document.getElementById('gen-type').value = collection;
                document.getElementById('generic-form-title').innerText = `Create New ${collection.slice(0,-1)}`;
                UI.openModal('modal-form-generic');
            },
            saveGeneric: async function(e) {
                e.preventDefault();
                const collection = document.getElementById('gen-type').value;
                const btn = document.getElementById('btn-save-generic');
                btn.innerText = "Saving...";
                btn.disabled = true;

                const data = {
                    title: document.getElementById('gen-title').value,
                    desc: document.getElementById('gen-desc').value
                };

                try {
                    await DB.insert(collection, data);
                    UI.closeModal('modal-form-generic');
                    AdminUI.loadSection(collection);
                } catch (err) {
                    console.error(err);
                } finally {
                    btn.innerText = "Save Changes";
                    btn.disabled = false;
                }
            },
            deleteItem: async function(collection, id) {
                if(confirm('Are you sure you want to delete this permanently from Firestore?')) {
                    try {
                        await DB.delete(collection, id);
                        if(collection === 'users') AdminUI.loadSection('users');
                        else AdminUI.loadSection(collection);
                    } catch(err) {
                        console.error(err);
                    }
                }
            }
        };


        // ----------------------------------------------------------------------
        // 7. MEMBER / CP APPLICATION INTERFACE
        // ----------------------------------------------------------------------
        const AppUI = {
            init: function() {
                UI.switchView('view-app');
                const user = Auth.currentUser;
                
                document.getElementById('user-info').innerHTML = `
                    <i class="fas fa-user-circle" style="font-size:2rem; color:var(--primary); margin-bottom:10px;"></i><br>
                    ${user.name} <br>
                    <span style="font-size:0.75rem; color:var(--text-light); text-transform:uppercase;">Role: ${user.role}</span>
                `;

                const cpNav = document.getElementById('cp-nav-container');
                if (user.role === 'cp' && user.patrouille) {
                    const p = DB.get('patrouilles').find(x => x.id === user.patrouille);
                    if(p) {
                        document.getElementById('cp-nav-name').innerText = p.title;
                        cpNav.style.display = 'block';
                    }
                } else {
                    cpNav.style.display = 'none';
                }

                this.navigate('dashboard');
            },
            navigate: function(page) {
                const container = document.getElementById('app-content-area');
                if(window.innerWidth <= 992) document.getElementById('sidebar-app').classList.remove('open');

                if (page === 'dashboard') {
                    const acts = DB.get('activities');
                    const anns = DB.get('announcements');
                    container.innerHTML = `
                        <h1 style="margin-bottom:20px;">Welcome back, ${Auth.currentUser.name}!</h1>
                        <div class="grid-cards">
                            <div class="data-card">
                                <h3><i class="fas fa-bullhorn" style="color:var(--primary)"></i> Latest Announcements</h3>
                                ${anns.length > 0 ? anns.map(a => `<div style="padding:10px 0; border-bottom:1px solid #eee;"><strong>${a.title}</strong><br><span style="font-size:0.9rem; color:var(--text-light);">${a.desc || ''}</span></div>`).join('') : '<p style="color:var(--text-light); margin-top:10px;">No new announcements in Firestore.</p>'}
                            </div>
                            <div class="data-card">
                                <h3><i class="fas fa-hiking" style="color:var(--accent)"></i> Upcoming Activities</h3>
                                ${acts.length > 0 ? acts.map(a => `<div style="padding:10px 0; border-bottom:1px solid #eee;"><strong>${a.title}</strong><br><span style="font-size:0.9rem; color:var(--text-light);">${a.desc || ''}</span></div>`).join('') : '<p style="color:var(--text-light); margin-top:10px;">No activities scheduled in Firestore.</p>'}
                            </div>
                        </div>
                    `;
                }
                else if (page === 'patrouilles') {
                    const pats = DB.get('patrouilles');
                    container.innerHTML = `
                        <h1 style="margin-bottom:20px;">Troupe Patrouilles</h1>
                        <div class="grid-cards">
                            ${pats.map(p => `
                                <div class="data-card" style="text-align:center;">
                                    <i class="fas fa-shield-alt" style="font-size:3rem; color:var(--primary); margin-bottom:15px;"></i>
                                    <h3>${p.title}</h3>
                                    <p style="color:var(--text-light); font-style:italic;">"${p.desc || ''}"</p>
                                </div>
                            `).join('')}
                            ${pats.length===0 ? '<p>No Patrouilles exist in Firestore.</p>' : ''}
                        </div>
                    `;
                }
                else if (page === 'my-patrouille') {
                    const p = DB.get('patrouilles').find(x => x.id === Auth.currentUser.patrouille);
                    const patMembers = DB.get('users').filter(u => u.patrouille === Auth.currentUser.patrouille);
                    container.innerHTML = `
                        <div style="background: linear-gradient(135deg, var(--primary), #003d82); padding: 40px 20px; border-radius: var(--border-radius); color: white; margin-bottom: 30px; box-shadow: var(--shadow);">
                            <h1>Patrouille: ${p ? p.title : 'My Patrouille'}</h1>
                            <p style="opacity:0.8;">CP Dashboard Access</p>
                        </div>
                        
                        <div class="data-card">
                            <h3>Patrouille Roster (${patMembers.length} Members)</h3>
                            <ul style="margin-top:15px;">
                                ${patMembers.map(m => `<li style="padding:10px 0; border-bottom:1px solid #eee; display:flex; justify-content:space-between;"><span>${m.name}</span><span style="color:var(--text-light); text-transform:uppercase; font-size:0.8rem;">${m.role}</span></li>`).join('')}
                            </ul>
                        </div>
                    `;
                }
                else {
                    container.innerHTML = `
                        <h1 style="margin-bottom:20px; text-transform:capitalize;">${page}</h1>
                        <div class="data-card" style="text-align:center; padding: 60px 20px;">
                            <i class="fas fa-folder-open" style="font-size:3rem; color:var(--text-light); opacity:0.5; margin-bottom:15px;"></i>
                            <h3 style="color:var(--text-dark);">Nothing here yet</h3>
                            <p style="color:var(--text-light);">Content will appear once loaded from Firestore.</p>
                        </div>
                    `;
                }
            }
        };
    </script>
</body>
</html>

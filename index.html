<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Troupe Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Base & Theme */
        :root {
            --primary: #2d6a4f; /* Scout Green */
            --secondary: #1b4332;
            --bg-light: #f4fdf4;
            --text-dark: #333;
            --white: #fff;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-light); color: var(--text-dark); overflow-x: hidden; }

        /* Navbar */
        header {
            background: var(--primary);
            color: var(--white);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        header h1 { font-size: 1.5rem; }
        
        .user-controls { display: flex; align-items: center; gap: 10px; }
        .badge { background: #ffd166; color: #333; padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; display: none; }

        /* Buttons */
        .btn {
            background: var(--white); color: var(--primary); border: none; padding: 10px 20px;
            border-radius: 25px; font-weight: 600; cursor: pointer; transition: var(--transition);
            min-height: 44px; display: inline-flex; align-items: center; justify-content: center;
        }
        .btn:hover { background: #e9ecef; }
        .btn-primary { background: var(--primary); color: var(--white); }
        .btn-primary:hover { background: var(--secondary); }
        .btn-danger { background: #ef476f; color: var(--white); }
        .btn-danger:hover { background: #d90429; }

        /* Layout */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .section-title { margin-bottom: 20px; color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 5px; display: inline-block; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card {
            background: var(--white); border-radius: 15px; padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: var(--transition);
            border-top: 5px solid var(--primary);
        }
        .card h3 { color: var(--primary); margin-bottom: 10px; }

        /* Modals & Forms */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--white); width: 100%; max-width: 600px; border-radius: 20px; padding: 30px; position: relative; max-height: 90vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #666; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; font-weight: 600; color: #555; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; min-height: 44px;
        }

        .admin-only, .chef-only { display: none; }
        body.is-dev .admin-only { display: block; }
        body.is-chef .chef-only { display: block; }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; padding: 15px; text-align: center; }
            .container { margin: 20px auto; }
            .modal-content { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>⛺ Troupe Dashboard</h1>
        <div class="user-controls">
            <span id="activeUserBadge" class="badge"></span>
            <button class="btn btn-danger hidden" id="btnLogout">Logout</button>
            <button class="btn" id="btnLoginBtn">Login</button>
            <button class="btn admin-only chef-only" id="btnDashboard">Manage Troupe</button>
        </div>
    </header>

    <div class="container">
        <h2 class="section-title">Our Patrouilles</h2>
        <div id="patrouilleGrid" class="grid">
            <!-- Populated via JS -->
        </div>
    </div>

    <!-- Login Modal -->
    <div id="modalLogin" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <span class="close-btn" onclick="closeModals()">&times;</span>
            <h2 style="margin-bottom: 20px; color: var(--primary);">Login</h2>
            <div class="form-group"><input type="text" id="loginUser" placeholder="Username"></div>
            <div class="form-group"><input type="password" id="loginPass" placeholder="Password"></div>
            <button class="btn btn-primary" id="btnSubmitLogin" style="width: 100%;">Login</button>
            <p id="loginError" style="color: red; margin-top: 10px; display: none;">Invalid credentials.</p>
        </div>
    </div>

    <!-- Dashboard Modal -->
    <div id="modalDashboard" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModals()">&times;</span>
            <h2 style="margin-bottom: 20px; color: var(--primary);">Management Dashboard</h2>
            
            <!-- Add Patrouille (Dev Only) -->
            <div class="admin-only" style="background: var(--bg-light); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                <h3>Create Patrouille</h3>
                <div class="form-group">
                    <input type="text" id="newPatrouilleName" placeholder="Patrouille Name (e.g., Lions)">
                </div>
                <button class="btn btn-primary" id="btnCreatePatrouille">Save Patrouille</button>
            </div>

            <!-- Add Member (Chef & Dev) -->
            <div class="chef-only admin-only" style="background: var(--bg-light); padding: 15px; border-radius: 10px;">
                <h3>Create Member Account</h3>
                <div class="form-group"><input type="text" id="newMemberName" placeholder="Username"></div>
                <div class="form-group"><input type="password" id="newMemberPass" placeholder="Password"></div>
                
                <div class="form-group">
                    <select id="newMemberRole">
                        <option value="member">Member</option>
                        <option value="chef">Chef</option>
                        <option value="dev" class="admin-only">Developer</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <select id="newMemberPatrouille">
                        <option value="">-- Assign to Patrouille --</option>
                    </select>
                </div>
                <button class="btn btn-primary" id="btnCreateMember">Create Account</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Provided New Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCe1J8DlrKqoDEovm56uOpkT_kmU8epBrc",
            authDomain: "troupe-6ff5d.firebaseapp.com",
            projectId: "troupe-6ff5d",
            storageBucket: "troupe-6ff5d.firebasestorage.app",
            messagingSenderId: "159243785679",
            appId: "1:159243785679:web:1c4d1c028f8b356f936eba",
            measurementId: "G-C4T3WMRFGK"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let patrouilles = [];
        let members = [];
        
        // PERSISTENCE MECHANIC: Load user from LocalStorage
        let activeUser = JSON.parse(localStorage.getItem('troupe_session')) || null;

        // --- Core Functions ---

        async function fetchDatabase() {
            try {
                // Get Patrouilles
                const pSnap = await getDocs(collection(db, "troupe_patrouilles"));
                patrouilles = [];
                pSnap.forEach(doc => patrouilles.push({ id: doc.id, ...doc.data() }));

                // Get Users/Members
                const uSnap = await getDocs(collection(db, "troupe_users"));
                members = [];
                uSnap.forEach(doc => members.push({ id: doc.id, ...doc.data() }));

                // Auto-create Master Dev if DB is empty
                if(members.length === 0) {
                    await addDoc(collection(db, "troupe_users"), { name: "admin", pass: "admin123", role: "dev", patrouilleId: "" });
                    fetchDatabase();
                    return;
                }

                renderUI();
                populateDropdowns();
            } catch (err) {
                console.error("Firebase Read Error:", err);
            }
        }

        function checkAuthState() {
            const badge = document.getElementById('activeUserBadge');
            const btnLogin = document.getElementById('btnLoginBtn');
            const btnLogout = document.getElementById('btnLogout');
            const body = document.body;

            // Reset classes
            body.classList.remove('is-dev', 'is-chef');

            if (activeUser) {
                btnLogin.style.display = 'none';
                btnLogout.style.display = 'inline-flex';
                badge.style.display = 'inline-block';
                badge.innerText = `${activeUser.name} (${activeUser.role})`;

                if (activeUser.role === 'dev') body.classList.add('is-dev');
                if (activeUser.role === 'chef' || activeUser.role === 'dev') body.classList.add('is-chef');
            } else {
                btnLogin.style.display = 'inline-flex';
                btnLogout.style.display = 'none';
                badge.style.display = 'none';
            }
        }

        function renderUI() {
            checkAuthState();
            const grid = document.getElementById('patrouilleGrid');
            grid.innerHTML = '';

            patrouilles.forEach(p => {
                // Find how many members are in this patrouille
                const count = members.filter(m => m.patrouilleId === p.id).length;
                
                grid.innerHTML += `
                    <div class="card">
                        <h3>${p.name}</h3>
                        <p style="color: #666; font-size: 0.9rem;">Members: ${count}</p>
                    </div>
                `;
            });
        }

        function populateDropdowns() {
            const select = document.getElementById('newMemberPatrouille');
            select.innerHTML = '<option value="">-- Assign to Patrouille --</option>';
            patrouilles.forEach(p => {
                select.innerHTML += `<option value="${p.id}">${p.name}</option>`;
            });
        }

        // --- Database Writes ---

        async function createPatrouille() {
            const name = document.getElementById('newPatrouilleName').value.trim();
            if (!name) return alert("Enter a name");

            document.getElementById('btnCreatePatrouille').innerText = "Saving...";
            await addDoc(collection(db, "troupe_patrouilles"), { name });
            document.getElementById('newPatrouilleName').value = '';
            document.getElementById('btnCreatePatrouille').innerText = "Save Patrouille";
            fetchDatabase();
        }

        async function createMember() {
            const name = document.getElementById('newMemberName').value.trim();
            const pass = document.getElementById('newMemberPass').value.trim();
            const role = document.getElementById('newMemberRole').value;
            const patrouilleId = document.getElementById('newMemberPatrouille').value;

            if (!name || !pass) return alert("Username and Password required");
            if (role === 'chef' && !patrouilleId) return alert("Chefs must be assigned a Patrouille");

            document.getElementById('btnCreateMember').innerText = "Saving...";
            await addDoc(collection(db, "troupe_users"), { name, pass, role, patrouilleId });
            
            document.getElementById('newMemberName').value = '';
            document.getElementById('newMemberPass').value = '';
            document.getElementById('btnCreateMember').innerText = "Create Account";
            fetchDatabase();
            alert("Member created successfully!");
        }

        // --- Auth Logic ---

        function handleLogin() {
            const u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPass').value;
            
            const match = members.find(m => m.name === u && m.pass === p);
            
            if (match) {
                // Save to LocalStorage so it survives refresh
                activeUser = { name: match.name, role: match.role, patrouilleId: match.patrouilleId };
                localStorage.setItem('troupe_session', JSON.stringify(activeUser));
                
                document.getElementById('loginError').style.display = 'none';
                closeModals();
                renderUI();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function handleLogout() {
            activeUser = null;
            localStorage.removeItem('troupe_session');
            renderUI();
        }

        // --- Utilities ---
        window.closeModals = function() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        }

        document.addEventListener("DOMContentLoaded", () => {
            fetchDatabase();

            // Modal Triggers
            document.getElementById('btnLoginBtn').addEventListener('click', () => document.getElementById('modalLogin').style.display = 'flex');
            document.getElementById('btnDashboard').addEventListener('click', () => document.getElementById('modalDashboard').style.display = 'flex');
            
            // Actions
            document.getElementById('btnSubmitLogin').addEventListener('click', handleLogin);
            document.getElementById('btnLogout').addEventListener('click', handleLogout);
            document.getElementById('btnCreatePatrouille').addEventListener('click', createPatrouille);
            document.getElementById('btnCreateMember').addEventListener('click', createMember);
        });

    </script>
</body>
</html>
